<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <title>H2D Form Controls Fixture</title>
    <style>
      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        background: #f5f6f8;
        color: #5e5f66;
        font-family: "PingFang SC", Arial, sans-serif;
        font-size: 12px;
      }

      .page {
        width: 1120px;
        margin: 40px auto;
        padding: 32px 40px;
        background: #fff;
      }

      .section-title {
        margin: 0 0 24px;
        color: #202124;
        font-size: 16px;
        font-weight: 600;
      }

      .topbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 24px;
      }

      .topbar .section-title {
        margin: 0;
      }

      .header-icon-line {
        display: inline-flex;
        align-items: center;
        height: 60px;
        gap: 4px;
        color: #1d2129;
        line-height: 60px;
      }

      .header-icon-line img {
        width: 16px;
        height: 60px;
      }

      .user-dropdown {
        position: relative;
        display: inline-flex;
        align-items: center;
        gap: 8px;
        height: 40px;
        color: #1d2129;
        font-size: 14px;
        line-height: 40px;
      }

      .user-dropdown img {
        width: 32px;
        height: 32px;
        border-radius: 50%;
      }

      .user-dropdown span {
        color: rgba(0, 0, 0, 0.45);
      }

      .user-dropdown .caret {
        width: 12px;
        height: 12px;
        color: #86888f;
      }

      .top-search-fixture {
        position: relative;
        flex: none;
        width: 274px;
        height: 32px;
      }

      .top-search-fixture .search-prefix-icon {
        position: absolute;
        z-index: 1;
        left: 8px;
        top: 7px;
        width: 18px;
        height: 18px;
        color: rgb(176, 178, 184);
      }

      .top-search-fixture input {
        width: 274px;
        height: 32px;
        border: 1px solid rgb(220, 223, 230);
        border-radius: 6px;
        padding: 0 12px 0 34px;
        background: #fff;
        color: #1d2129;
        line-height: 30px;
        box-sizing: border-box;
      }

      .grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        column-gap: 56px;
        row-gap: 16px;
      }

      .field {
        display: flex;
        align-items: center;
        min-width: 0;
        height: 32px;
      }

      .field.wide {
        grid-column: 1 / -1;
        align-items: flex-start;
        height: auto;
      }

      label {
        position: relative;
        flex: 0 0 88px;
        margin-right: 20px;
        text-align: right;
        line-height: 22px;
      }

      label.required::before {
        content: "*";
        position: absolute;
        left: 0;
        top: 12px;
        width: 6px;
        height: 0;
        margin-left: -8px;
        color: rgb(204, 41, 41);
        font-size: 12px;
        line-height: 0;
      }

      input,
      textarea {
        width: 350px;
        height: 32px;
        border: 1px solid rgb(230, 231, 235);
        border-radius: 5px;
        padding: 4px 8px;
        color: #0f1014;
        font-size: 14px;
        line-height: 22px;
        outline: none;
      }

      textarea {
        width: 964px;
        height: 84px;
        resize: none;
      }

      input::placeholder,
      textarea::placeholder {
        color: #b0b2b8;
      }

      .h2d-select {
        position: relative;
        width: 350px;
        height: 32px;
        min-height: 30px;
        color: #b0b2b8;
        font-size: 14px;
        line-height: 22px;
      }

      .h2d-select-selection {
        position: relative;
        display: flex;
        align-items: center;
        width: 100%;
        height: 32px;
        min-height: 26px;
        overflow: hidden;
        border: 1px solid rgb(230, 231, 235);
        border-radius: 5px;
        background: #fff;
      }

      .h2d-select-placeholder {
        position: absolute;
        left: 8px;
        top: 50%;
        max-width: calc(100% - 40px);
        height: 20px;
        margin-top: -10px;
        overflow: hidden;
        white-space: nowrap;
      }

      .h2d-select-rendered {
        width: 100%;
        height: 26px;
        margin: 0;
        padding: 0 24px 0 8px;
        overflow: hidden;
        list-style: none;
      }

      .h2d-select-search {
        width: 100%;
        height: 26px;
      }

      .h2d-select-search-input {
        width: 100%;
        height: 26px;
        border: 0;
        padding: 0;
        background: transparent;
        color: rgba(0, 0, 0, 0);
        outline: none;
      }

      .h2d-select-arrow {
        position: absolute;
        right: 8px;
        top: 50%;
        width: 12px;
        height: 12px;
        transform: translateY(-50%);
        color: #86888f;
        pointer-events: none;
      }

      .italent-like-field {
        grid-column: 1 / -1;
      }

      .italent-select-shell {
        position: relative;
        width: 425.296875px;
        height: 32px;
        overflow: hidden;
        border: 1px solid rgb(230, 231, 235);
        border-radius: 5px;
        background: #fff;
        color: #b0b2b8;
        font-size: 14px;
        line-height: 22px;
      }

      .wtspe-select-placeholder {
        position: absolute;
        left: 8px;
        top: 5px;
        width: 389.359375px;
        height: 22px;
        overflow: hidden;
        white-space: nowrap;
      }

      .wtspe-select-search-field {
        position: absolute;
        left: 8px;
        top: 3px;
        width: 389.359375px;
        height: 26px;
      }

      .wtspe-select-search-field-input {
        width: 100%;
        height: 26px;
        border: 0;
        padding: 0;
        background: transparent;
        color: rgba(0, 0, 0, 0);
        outline: none;
      }

      .wtspe-select-arrow {
        position: absolute;
        right: 8px;
        top: 10px;
        width: 12px;
        height: 12px;
        color: #86888f;
        pointer-events: none;
      }

      .segmented {
        position: relative;
        display: inline-flex;
        grid-column: 1 / -1;
        width: max-content;
        padding: 2px;
        border-radius: 2px;
        background: #f5f7fa;
        color: #1d2129;
        font-size: 14px;
      }

      .segmented-active-bg {
        position: absolute;
        left: 2px;
        top: 2px;
        width: 50px;
        height: 28px;
        background: rgb(250, 115, 5);
      }

      .segmented label {
        position: relative;
        z-index: 1;
        flex: none;
        width: auto;
        height: 28px;
        margin: 0;
        padding: 0 11px;
        color: #1d2129;
        line-height: 28px;
      }

      .segmented label.active {
        color: #fff;
      }

      .filter-row {
        display: flex;
        grid-column: 1 / -1;
        column-gap: 40px;
      }

      .filter-row label {
        flex: none;
        width: auto;
        margin: 0;
        text-align: start;
      }

      .sprite-button {
        display: inline-flex;
        align-items: center;
        gap: 4px;
        height: 32px;
        padding: 0 12px;
        border-radius: 4px;
        background: #008f50;
        color: #fff;
        line-height: 32px;
      }

      .sprite-button svg {
        width: 16px;
        height: 16px;
        fill: currentColor;
      }

      .ant-range-like {
        display: inline-flex;
        align-items: center;
        width: 300px;
        height: 32px;
        border: 1px solid rgb(217, 217, 217);
        border-radius: 4px;
        background: #fff;
        color: rgba(0, 0, 0, 0.25);
        font-size: 14px;
        line-height: 14px;
      }

      .ant-range-like .ant-picker-input {
        position: relative;
        width: 113px;
        height: 22px;
        margin-left: 12px;
      }

      .ant-range-like input {
        width: 100%;
        height: 22px;
        border: 0;
        padding: 0;
        color: rgba(0, 0, 0, 0.88);
        line-height: 22px;
      }

      .ant-range-like .swap {
        width: 32px;
        text-align: center;
      }

      .ant-range-like .calendar {
        width: 14px;
        height: 14px;
        margin-left: auto;
        margin-right: 10px;
      }

      .page-size-select {
        position: relative;
        width: 94px;
        height: 32px;
        border: 1px solid rgb(217, 217, 217);
        border-radius: 4px;
        background: #fff;
        color: rgba(0, 0, 0, 0.88);
        font-size: 14px;
        line-height: 22px;
      }

      .page-size-select .page-size-text {
        width: 100%;
        height: 32px;
        line-height: 32px;
      }

      .page-size-select .page-size-arrow {
        position: absolute;
        right: 10px;
        top: 9px;
        width: 14px;
        height: 14px;
      }

      .empty-select-popper {
        position: absolute;
        left: 650px;
        top: 326px;
        width: 160px;
        height: 32px;
        border: 1px solid rgb(217, 217, 217);
        border-radius: 4px;
        background: #fff;
        color: rgba(0, 0, 0, 0.45);
        font-size: 14px;
        line-height: 32px;
        padding-left: 12px;
      }

      .tooltip-trigger-select {
        position: relative;
        display: flex;
        align-items: center;
        width: 200px;
        height: 32px;
        border-radius: 2px;
        background: #fff;
        box-shadow: rgb(220, 223, 230) 0 0 0 1px inset;
        box-sizing: border-box;
      }

      .tooltip-trigger-select input {
        width: 100%;
        height: 30px;
        border: 0;
        padding: 0 28px 0 11px;
        background: transparent;
        color: #1d2129;
        line-height: 30px;
        box-sizing: border-box;
      }

      .tooltip-trigger-select .el-input__suffix {
        position: absolute;
        right: 8px;
        top: 9px;
        width: 14px;
        height: 14px;
        color: #86909c;
      }

      .tooltip-trigger-select .el-select__caret {
        width: 14px;
        height: 14px;
      }

      .ant-form-label {
        display: inline-flex;
        align-items: center;
        height: 32px;
        white-space: nowrap;
      }

      .ant-form-label::after {
        content: ":";
        position: relative;
        left: 0;
        margin-left: 2px;
        line-height: 22px;
      }

      .el-like-wrapper {
        display: flex;
        align-items: center;
        justify-content: center;
        width: 200px;
        height: 32px;
        padding: 1px 11px;
        border-radius: 2px;
        background: #fff;
        box-shadow: rgb(220, 223, 230) 0 0 0 1px inset;
      }

      .el-like-wrapper input {
        width: 178px;
        height: 30px;
        border: 0;
        padding: 0;
        line-height: 30px;
      }

      .date-range-picker {
        display: flex;
        align-items: center;
        width: 260px;
        height: 32px;
        border: 1px solid rgb(230, 231, 235);
        border-radius: 2px;
        background: #fff;
        color: #4e5969;
        font-size: 14px;
      }

      .date-range-picker svg {
        width: 14px;
        height: 14px;
        margin: 0 8px;
        color: #86909c;
      }

      .date-range-picker input {
        width: 88px;
        height: 30px;
        border: 0;
        padding: 0;
        color: #1d2129;
        line-height: 30px;
      }

      .date-range-separator {
        width: 20px;
        text-align: center;
      }

      .menu-fixture {
        grid-column: 1 / -1;
        width: 240px;
        padding: 4px 0;
        background: #fff;
        color: rgba(0, 0, 0, 0.65);
      }

      .menu-row {
        position: relative;
        display: flex;
        align-items: center;
        height: 40px;
        padding: 0 34px 0 12px;
        overflow: hidden;
        font-size: 14px;
        line-height: 40px;
      }

      .ant-menu-item-icon {
        display: flex;
        align-items: center;
        justify-content: center;
        width: 14px;
        height: 14px;
        margin-right: 8px;
        color: rgba(0, 0, 0, 0.65);
      }

      .ant-menu-item-icon [role="img"],
      .ant-menu-item-icon svg {
        display: block;
        width: 14px;
        height: 14px;
      }

      .menu-arrow {
        position: absolute;
        top: 20px;
        right: 16px;
        width: 10px;
        height: 0;
        color: rgba(0, 0, 0, 0.65);
      }

      .menu-arrow::before,
      .menu-arrow::after {
        content: "";
        position: absolute;
        top: 0;
        width: 6px;
        height: 1.5px;
        border-radius: 6px;
        background: rgba(0, 0, 0, 0.65);
      }

      .menu-arrow-down::before {
        left: 0;
        transform: rotate(45deg);
        transform-origin: 5px 0;
      }

      .menu-arrow-down::after {
        right: 0;
        transform: rotate(-45deg);
        transform-origin: 1px 0;
      }

      .menu-arrow-up::before {
        left: 0;
        transform: rotate(-45deg);
        transform-origin: 5px 0;
      }

      .menu-arrow-up::after {
        right: 0;
        transform: rotate(45deg);
        transform-origin: 1px 0;
      }

      .menu-child {
        height: 32px;
        padding-left: 40px;
        color: rgba(0, 0, 0, 0.65);
        font-size: 14px;
        line-height: 32px;
      }

      .radio-row {
        display: inline-flex;
        grid-column: 1 / -1;
        align-items: center;
        gap: 8px;
        height: 24px;
        color: rgba(0, 0, 0, 0.88);
        font-size: 14px;
      }

      .ant-radio-wrapper {
        position: relative;
        display: inline-flex;
        align-items: flex-start;
        height: 22px;
        color: rgba(0, 0, 0, 0.88);
        line-height: 22px;
      }

      .ant-radio {
        position: relative;
        display: block;
        width: 16px;
        height: 16px;
        margin-top: 3px;
      }

      .ant-radio input {
        position: absolute;
        inset: 0;
        width: 16px;
        height: 16px;
        margin: 0;
        opacity: 0;
      }

      .ant-radio-inner {
        position: relative;
        display: block;
        width: 16px;
        height: 16px;
        border-radius: 50%;
        background: rgb(255, 255, 255);
      }

      .ant-radio-checked .ant-radio-inner {
        background: rgb(0, 143, 80);
      }

      .ant-radio-checked .ant-radio-inner::after {
        content: "";
        position: absolute;
        inset: 0;
        width: 16px;
        height: 16px;
        border-radius: 50%;
        background: rgb(255, 255, 255);
        transform: scale(0.375);
      }

      .ant-radio-label {
        display: block;
        padding-left: 8px;
        white-space: nowrap;
      }

      .fixture-drawer {
        position: fixed;
        z-index: 1100;
        right: 0;
        top: 0;
        width: 560px;
        height: 520px;
        border-left: 1px solid #e5e6eb;
        background: #fff;
        box-shadow: -8px 0 18px rgba(0, 0, 0, 0.08);
      }

      .fixture-drawer-header,
      .fixture-drawer-footer {
        height: 52px;
        padding: 0 20px;
        border-bottom: 1px solid #eef0f3;
        color: #1d2129;
        font-size: 16px;
        font-weight: 600;
        line-height: 52px;
      }

      .fixture-drawer-footer {
        position: absolute;
        left: 0;
        right: 0;
        bottom: 0;
        border-top: 1px solid #eef0f3;
        border-bottom: 0;
        text-align: right;
      }

      .fixture-drawer-body {
        position: absolute;
        left: 0;
        right: 0;
        top: 52px;
        bottom: 52px;
        overflow: auto;
        padding: 18px 20px;
      }

      .drawer-step {
        height: 220px;
        margin-bottom: 20px;
        border-radius: 4px;
        background: #f2f3f5;
        color: #4e5969;
        line-height: 220px;
        text-align: center;
      }

      .drawer-result {
        width: 100%;
        border-collapse: collapse;
        color: #1d2129;
        font-size: 14px;
      }

      .drawer-result th,
      .drawer-result td {
        height: 48px;
        border-bottom: 1px solid #e5e6eb;
        text-align: left;
      }

      .drawer-bottom-marker {
        display: inline-flex;
        align-items: center;
        height: 24px;
        padding: 0 8px;
        border-radius: 4px;
        background: rgb(0, 143, 80);
        color: #fff;
      }
    </style>
  </head>
  <body>
    <svg width="0" height="0" style="position:absolute;left:-9999px;top:-9999px" aria-hidden="true">
      <symbol id="fixture-export" viewBox="0 0 16 16">
        <path d="M8 2v7m0 0 3-3M8 9 5 6M3 12h10" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"></path>
      </symbol>
    </svg>
    <main class="page">
      <header class="topbar">
        <div class="header-icon-line">
          <img alt="" src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'%3E%3Cpath d='M2 13h12M4 11V5h3v6M9 11V2h3v9' stroke='%23008f50' stroke-width='1.5' fill='none' stroke-linecap='round'/%3E%3C/svg%3E" />
          <span class="brand-name-fixture">趋势科技有限公司</span>
          <h1 class="section-title">表单控件还原 Fixture</h1>
        </div>
        <div class="top-search-fixture">
          <span class="search-prefix-icon">
            <svg class="Header-AppItemIcon" width="18px" height="18px" viewBox="0 0 18 18" aria-hidden="true">
              <path d="M8.25 3a5.25 5.25 0 1 0 0 10.5A5.25 5.25 0 0 0 8.25 3Zm0 1.5a3.75 3.75 0 1 1 0 7.5 3.75 3.75 0 0 1 0-7.5Z" fill="currentColor"></path>
              <path d="m12.1 12.1 2.65 2.65" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"></path>
            </svg>
          </span>
          <input placeholder="搜索菜单/同事" />
        </div>
        <div class="user-dropdown ant-dropdown-trigger">
          <img alt="" src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Ccircle cx='16' cy='16' r='16' fill='%23ff8a3d'/%3E%3Ccircle cx='16' cy='12' r='5' fill='%23fff0df'/%3E%3Cpath d='M7 28c1.8-6.2 15.2-6.2 18 0' fill='%23fff0df'/%3E%3C/svg%3E" />
          <span>Serati Ma</span>
          <svg class="caret" viewBox="0 0 12 12" aria-hidden="true">
            <path d="M3 4.5 6 7.5 9 4.5" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"></path>
          </svg>
        </div>
      </header>
      <section class="grid">
        <nav class="menu-fixture" aria-label="菜单箭头 fixture">
          <div class="menu-row" role="menuitem" aria-haspopup="true" aria-expanded="false">
            <span class="ant-menu-item-icon">
              <span role="img" aria-label="team">
                <svg viewBox="64 64 896 896" data-icon="team" aria-hidden="true">
                  <path d="M824 700a302 302 0 0 0-86-60c45-37 74-93 74-156 0-111-92-202-203-200-109 2-197 91-197 200 0 63 29 119 74 156a301 301 0 0 0-86 60c-55 55-86 127-88 204a8 8 0 0 0 8 8h56c4 0 8-3 8-8 2-58 25-112 67-153a227 227 0 0 1 322 0c41 41 65 95 67 153 0 5 4 8 8 8h56a8 8 0 0 0 8-8c-2-77-33-149-88-204zM612 612a128 128 0 1 1 0-256 128 128 0 0 1 0 256z" fill="currentColor"></path>
                </svg>
              </span>
            </span>
            <span>工程师管理</span>
            <i class="menu-arrow menu-arrow-down"></i>
          </div>
          <div class="menu-row" role="menuitem" aria-haspopup="true" aria-expanded="true">
            系统管理
            <i class="menu-arrow menu-arrow-up"></i>
          </div>
          <div class="menu-child">技能标签配置</div>
        </nav>

        <div class="segmented">
          <div class="segmented-active-bg"></div>
          <label class="active">全部</label>
          <label>待立项</label>
          <label>已立项</label>
        </div>

        <div class="filter-row">
          <label class="ant-form-label" title="企业">企业</label>
          <label class="ant-form-label" title="联系人">联系人</label>
          <button class="sprite-button">
            <svg viewBox="0 0 16 16" aria-hidden="true"><use href="#fixture-export"></use></svg>
            数据导出
          </button>
          <label class="ant-form-label" title="地区">地区</label>
          <div class="tooltip-trigger-select el-tooltip__trigger el-tooltip__trigger el-input__wrapper" role="combobox" aria-haspopup="listbox">
            <input readonly placeholder="请选择地区" />
            <span class="el-input__suffix">
              <svg class="el-select__caret" viewBox="0 0 12 12" aria-hidden="true">
                <path d="M3 4.5 6 7.5 9 4.5" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"></path>
              </svg>
            </span>
          </div>
          <div class="el-select-dropdown empty-select-popper" role="listbox">请选择地区</div>
        </div>

        <div class="field">
          <label class="required">职位名称</label>
          <input placeholder="请输入" />
        </div>

        <div class="field">
          <label class="required">招聘类别</label>
          <div class="h2d-select" aria-haspopup="listbox">
            <div class="h2d-select-selection">
              <span class="h2d-select-placeholder">请选择</span>
              <ul class="h2d-select-rendered">
                <li class="h2d-select-search">
                  <input
                    class="h2d-select-search-input"
                    role="combobox"
                    readonly
                    placeholder="请选择"
                    aria-haspopup="listbox"
                  />
                </li>
              </ul>
              <svg class="h2d-select-arrow" viewBox="0 0 12 12" aria-hidden="true">
                <path d="M3 4.5 6 7.5 9 4.5" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"></path>
              </svg>
            </div>
          </div>
        </div>

        <div class="field">
          <label class="required">需求部门</label>
          <div class="h2d-select" aria-haspopup="listbox">
            <div class="h2d-select-selection">
              <span class="h2d-select-placeholder">请选择</span>
              <ul class="h2d-select-rendered">
                <li class="h2d-select-search">
                  <input
                    class="h2d-select-search-input"
                    role="combobox"
                    readonly
                    placeholder="请选择"
                    aria-haspopup="listbox"
                  />
                </li>
              </ul>
              <svg class="h2d-select-arrow" viewBox="0 0 12 12" aria-hidden="true">
                <path d="M3 4.5 6 7.5 9 4.5" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"></path>
              </svg>
            </div>
          </div>
        </div>

        <div class="field">
          <label>专业要求</label>
          <input placeholder="请输入" />
        </div>

        <div class="field">
          <label>订单编号</label>
          <div class="el-like-wrapper">
            <input placeholder="请输入订单编号" />
          </div>
        </div>

        <div class="field">
          <label>创建时间</label>
          <div class="date-range-picker">
            <svg viewBox="0 0 16 16" aria-hidden="true">
              <path d="M3 2.5h10a1 1 0 0 1 1 1v9.5a1 1 0 0 1-1 1H3a1 1 0 0 1-1-1V3.5a1 1 0 0 1 1-1Zm0 4h10M5 1.5v3M11 1.5v3" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"></path>
            </svg>
            <input placeholder="开始日期" />
            <span class="date-range-separator">-</span>
            <input placeholder="结束日期" />
          </div>
        </div>

        <div class="field">
          <label>推送时间</label>
          <div class="ant-range-like">
            <div class="ant-picker-input">
              <input readonly placeholder="推送开始时间" />
            </div>
            <span class="swap">→</span>
            <div class="ant-picker-input">
              <input readonly placeholder="结束时间" />
            </div>
            <svg class="calendar" data-icon="calendar" viewBox="0 0 16 16" aria-hidden="true">
              <path d="M3 2.5h10a1 1 0 0 1 1 1v9.5a1 1 0 0 1-1 1H3a1 1 0 0 1-1-1V3.5a1 1 0 0 1 1-1Zm0 4h10M5 1.5v3M11 1.5v3" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"></path>
            </svg>
          </div>
        </div>

        <div class="field">
          <label>前往</label>
          <div class="el-like-wrapper">
            <input id="fixture-page-jump" type="number" aria-label="页" />
          </div>
        </div>

        <div class="field">
          <label>分页条数</label>
          <div class="page-size-select" role="combobox" aria-haspopup="listbox">
            <span class="page-size-text">10 条/页</span>
            <svg class="page-size-arrow" viewBox="0 0 12 12" aria-hidden="true">
              <path d="M3 4.5 6 7.5 9 4.5" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"></path>
            </svg>
          </div>
        </div>

        <div class="radio-row">
          <label class="ant-radio-wrapper">
            <span class="ant-radio ant-radio-checked">
              <input type="radio" checked value="0" />
              <span class="ant-radio-inner"></span>
            </span>
            <span class="ant-radio-label">连续劳务多个税计算规则</span>
          </label>
          <label class="ant-radio-wrapper">
            <span class="ant-radio">
              <input type="radio" value="1" />
              <span class="ant-radio-inner"></span>
            </span>
            <span class="ant-radio-label">个人薪金所得个税计算规则</span>
          </label>
        </div>

        <div class="field italent-like-field">
          <label>iTalent 下拉</label>
          <div class="italent-select-shell">
            <span class="wtspe-select-placeholder">请选择</span>
            <div class="wtspe-select-search-field" aria-haspopup="listbox">
              <input
                class="wtspe-select-search-field-input"
                role="combobox"
                readonly
                placeholder="请选择"
                aria-haspopup="listbox"
              />
            </div>
            <svg class="wtspe-select-arrow" viewBox="0 0 12 12" aria-hidden="true">
              <path d="M3 4.5 6 7.5 9 4.5" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"></path>
            </svg>
          </div>
        </div>

        <div class="field wide">
          <label>工作职责</label>
          <textarea placeholder="请说明该职位的工作职责"></textarea>
        </div>
      </section>
    </main>
    <aside class="fixture-drawer">
      <div class="fixture-drawer-header">税金试算</div>
      <div class="fixture-drawer-body" id="fixture-drawer-body">
        <div class="drawer-step">第一步：选择结算运营主体</div>
        <div class="drawer-step">第二步：个税计算规则</div>
        <table class="drawer-result">
          <thead>
            <tr>
              <th>试算任务编号</th>
              <th>试算状态</th>
              <th>操作</th>
            </tr>
          </thead>
          <tbody>
            <tr>
              <td>SR-584954732930...</td>
              <td>试算成功</td>
              <td><span class="drawer-bottom-marker">下载明细</span></td>
            </tr>
            <tr>
              <td>SR-576610368290...</td>
              <td>试算成功</td>
              <td><span class="drawer-bottom-marker">下载明细</span></td>
            </tr>
          </tbody>
        </table>
      </div>
      <div class="fixture-drawer-footer">去结算</div>
    </aside>
    <script>
      document.getElementById("fixture-page-jump").value = "3";
      document.getElementById("fixture-drawer-body").scrollTop = 360;
    </script>
  </body>
</html>
